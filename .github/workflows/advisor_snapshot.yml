name: Broker Bot Cloud Run

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 4:15pm ET = 21:15 UTC during standard time (winter)
    - cron: "15 21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: broker-bot-cloud-run-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cloud_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.bot.txt

      - name: Restore DB from snapshot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER_URL: ${{ secrets.ALPACA_PAPER_URL }}
          ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
          ALPACA_LLM_API_KEY: ${{ secrets.ALPACA_LLM_API_KEY }}
          ALPACA_LLM_SECRET_KEY: ${{ secrets.ALPACA_LLM_SECRET_KEY }}
          ALPACA_LLM_PAPER_URL: ${{ secrets.ALPACA_LLM_PAPER_URL }}
          ALPACA_LLM_DATA_FEED: ${{ secrets.ALPACA_LLM_DATA_FEED }}
          ALPACA_STAT_ARB_API_KEY: ${{ secrets.ALPACA_STAT_ARB_API_KEY }}
          ALPACA_STAT_ARB_SECRET_KEY: ${{ secrets.ALPACA_STAT_ARB_SECRET_KEY }}
          ALPACA_STAT_ARB_PAPER_URL: ${{ secrets.ALPACA_STAT_ARB_PAPER_URL }}
          ALPACA_STAT_ARB_DATA_FEED: ${{ secrets.ALPACA_STAT_ARB_DATA_FEED }}
        run: |
          python scripts/restore_db_from_snapshot.py

      - name: Validate required configuration
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER_URL: ${{ secrets.ALPACA_PAPER_URL }}
          ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
          ALPACA_LLM_API_KEY: ${{ secrets.ALPACA_LLM_API_KEY }}
          ALPACA_LLM_SECRET_KEY: ${{ secrets.ALPACA_LLM_SECRET_KEY }}
          ALPACA_LLM_PAPER_URL: ${{ secrets.ALPACA_LLM_PAPER_URL }}
          ALPACA_LLM_DATA_FEED: ${{ secrets.ALPACA_LLM_DATA_FEED }}
          ALPACA_STAT_ARB_API_KEY: ${{ secrets.ALPACA_STAT_ARB_API_KEY }}
          ALPACA_STAT_ARB_SECRET_KEY: ${{ secrets.ALPACA_STAT_ARB_SECRET_KEY }}
          ALPACA_STAT_ARB_PAPER_URL: ${{ secrets.ALPACA_STAT_ARB_PAPER_URL }}
          ALPACA_STAT_ARB_DATA_FEED: ${{ secrets.ALPACA_STAT_ARB_DATA_FEED }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_ENABLED: ${{ secrets.LLM_ENABLED }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          MIN_SIGNAL_ABS_SCORE: ${{ secrets.MIN_SIGNAL_ABS_SCORE }}
          LLM_MIN_CONVICTION: ${{ secrets.LLM_MIN_CONVICTION }}
          LLM_SKEPTIC_ENABLED: ${{ secrets.LLM_SKEPTIC_ENABLED }}
          LLM_SKEPTIC_VETO_ENABLED: ${{ secrets.LLM_SKEPTIC_VETO_ENABLED }}
          STAT_ARB_LOOKBACK_DAYS: ${{ secrets.STAT_ARB_LOOKBACK_DAYS }}
          STAT_ARB_SYMBOL_LIMIT: ${{ secrets.STAT_ARB_SYMBOL_LIMIT }}
          STAT_ARB_MIN_CORRELATION: ${{ secrets.STAT_ARB_MIN_CORRELATION }}
          STAT_ARB_ENTRY_Z: ${{ secrets.STAT_ARB_ENTRY_Z }}
          STAT_ARB_EXIT_Z: ${{ secrets.STAT_ARB_EXIT_Z }}
          STAT_ARB_MAX_PAIRS: ${{ secrets.STAT_ARB_MAX_PAIRS }}
          STAT_ARB_PAIR_GROSS_PCT: ${{ secrets.STAT_ARB_PAIR_GROSS_PCT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          python - <<'PY'
          import os
          required = ["ALPACA_API_KEY", "ALPACA_SECRET_KEY"]
          optional = [
              "ALPACA_PAPER_URL",
              "ALPACA_DATA_FEED",
              "ALPACA_LLM_API_KEY",
              "ALPACA_LLM_SECRET_KEY",
              "ALPACA_LLM_PAPER_URL",
              "ALPACA_LLM_DATA_FEED",
              "ALPACA_STAT_ARB_API_KEY",
              "ALPACA_STAT_ARB_SECRET_KEY",
              "ALPACA_STAT_ARB_PAPER_URL",
              "ALPACA_STAT_ARB_DATA_FEED",
              "OPENAI_API_KEY",
              "LLM_ENABLED",
              "LLM_MODEL",
              "MIN_SIGNAL_ABS_SCORE",
              "LLM_MIN_CONVICTION",
              "LLM_SKEPTIC_ENABLED",
              "LLM_SKEPTIC_VETO_ENABLED",
              "STAT_ARB_LOOKBACK_DAYS",
              "STAT_ARB_SYMBOL_LIMIT",
              "STAT_ARB_MIN_CORRELATION",
              "STAT_ARB_ENTRY_Z",
              "STAT_ARB_EXIT_Z",
              "STAT_ARB_MAX_PAIRS",
              "STAT_ARB_PAIR_GROSS_PCT",
              "API_TOKEN",
          ]
          missing = [name for name in required if not os.getenv(name, "").strip()]
          if missing:
              raise SystemExit(f"Missing required GitHub Actions secrets: {', '.join(missing)}")
          print("Required secrets present.")
          for name in optional:
              print(f"{name}: {'set' if os.getenv(name, '').strip() else 'not set'}")
          PY

      - name: Export bot environment
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER_URL: ${{ secrets.ALPACA_PAPER_URL }}
          ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
          ALPACA_LLM_API_KEY: ${{ secrets.ALPACA_LLM_API_KEY }}
          ALPACA_LLM_SECRET_KEY: ${{ secrets.ALPACA_LLM_SECRET_KEY }}
          ALPACA_LLM_PAPER_URL: ${{ secrets.ALPACA_LLM_PAPER_URL }}
          ALPACA_LLM_DATA_FEED: ${{ secrets.ALPACA_LLM_DATA_FEED }}
          ALPACA_STAT_ARB_API_KEY: ${{ secrets.ALPACA_STAT_ARB_API_KEY }}
          ALPACA_STAT_ARB_SECRET_KEY: ${{ secrets.ALPACA_STAT_ARB_SECRET_KEY }}
          ALPACA_STAT_ARB_PAPER_URL: ${{ secrets.ALPACA_STAT_ARB_PAPER_URL }}
          ALPACA_STAT_ARB_DATA_FEED: ${{ secrets.ALPACA_STAT_ARB_DATA_FEED }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_ENABLED: ${{ secrets.LLM_ENABLED }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          MIN_SIGNAL_ABS_SCORE: ${{ secrets.MIN_SIGNAL_ABS_SCORE }}
          LLM_MIN_CONVICTION: ${{ secrets.LLM_MIN_CONVICTION }}
          LLM_SKEPTIC_ENABLED: ${{ secrets.LLM_SKEPTIC_ENABLED }}
          LLM_SKEPTIC_VETO_ENABLED: ${{ secrets.LLM_SKEPTIC_VETO_ENABLED }}
          STAT_ARB_LOOKBACK_DAYS: ${{ secrets.STAT_ARB_LOOKBACK_DAYS }}
          STAT_ARB_SYMBOL_LIMIT: ${{ secrets.STAT_ARB_SYMBOL_LIMIT }}
          STAT_ARB_MIN_CORRELATION: ${{ secrets.STAT_ARB_MIN_CORRELATION }}
          STAT_ARB_ENTRY_Z: ${{ secrets.STAT_ARB_ENTRY_Z }}
          STAT_ARB_EXIT_Z: ${{ secrets.STAT_ARB_EXIT_Z }}
          STAT_ARB_MAX_PAIRS: ${{ secrets.STAT_ARB_MAX_PAIRS }}
          STAT_ARB_PAIR_GROSS_PCT: ${{ secrets.STAT_ARB_PAIR_GROSS_PCT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          UNIVERSE_PATH: data/sp500.csv
          BROKER_BOT_DB: data/broker_bot.sqlite
          MODEL_DIR: data/models
          REPORTS_DIR: data/reports
          LEARNED_POLICY_PATH: data/learned_policy.json
          CHAMPION_POLICY_PATH: data/champion_challenger_policy.json
        run: |
          {
            echo "ALPACA_API_KEY=${ALPACA_API_KEY}"
            echo "ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}"
            echo "ALPACA_PAPER_URL=${ALPACA_PAPER_URL}"
            echo "ALPACA_DATA_FEED=${ALPACA_DATA_FEED}"
            echo "ALPACA_LLM_API_KEY=${ALPACA_LLM_API_KEY}"
            echo "ALPACA_LLM_SECRET_KEY=${ALPACA_LLM_SECRET_KEY}"
            echo "ALPACA_LLM_PAPER_URL=${ALPACA_LLM_PAPER_URL}"
            echo "ALPACA_LLM_DATA_FEED=${ALPACA_LLM_DATA_FEED}"
            echo "ALPACA_STAT_ARB_API_KEY=${ALPACA_STAT_ARB_API_KEY}"
            echo "ALPACA_STAT_ARB_SECRET_KEY=${ALPACA_STAT_ARB_SECRET_KEY}"
            echo "ALPACA_STAT_ARB_PAPER_URL=${ALPACA_STAT_ARB_PAPER_URL}"
            echo "ALPACA_STAT_ARB_DATA_FEED=${ALPACA_STAT_ARB_DATA_FEED}"
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}"
            echo "LLM_ENABLED=${LLM_ENABLED}"
            echo "LLM_MODEL=${LLM_MODEL}"
            echo "API_TOKEN=${API_TOKEN}"
            echo "UNIVERSE_PATH=${UNIVERSE_PATH}"
            echo "BROKER_BOT_DB=${BROKER_BOT_DB}"
            echo "MODEL_DIR=${MODEL_DIR}"
            echo "REPORTS_DIR=${REPORTS_DIR}"
            echo "LEARNED_POLICY_PATH=${LEARNED_POLICY_PATH}"
            echo "CHAMPION_POLICY_PATH=${CHAMPION_POLICY_PATH}"
            for name in MIN_SIGNAL_ABS_SCORE LLM_MIN_CONVICTION LLM_SKEPTIC_ENABLED LLM_SKEPTIC_VETO_ENABLED STAT_ARB_LOOKBACK_DAYS STAT_ARB_SYMBOL_LIMIT STAT_ARB_MIN_CORRELATION STAT_ARB_ENTRY_Z STAT_ARB_EXIT_Z STAT_ARB_MAX_PAIRS STAT_ARB_PAIR_GROSS_PCT; do
              value="${!name}"
              if [ -n "$value" ]; then
                echo "${name}=${value}"
              fi
            done
          } >> "$GITHUB_ENV"

      - name: Detect whether LLM bot credentials are configured
        id: llm_bot_config
        run: |
          if [ -n "${ALPACA_LLM_API_KEY}" ] && [ -n "${ALPACA_LLM_SECRET_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect whether Stat Arb bot credentials are configured
        id: stat_arb_bot_config
        run: |
          if [ -n "${ALPACA_STAT_ARB_API_KEY}" ] && [ -n "${ALPACA_STAT_ARB_SECRET_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Alpaca trading and market data access
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timedelta, timezone

          from alpaca.trading.client import TradingClient
          from alpaca.data.historical import StockHistoricalDataClient
          from alpaca.data.requests import StockBarsRequest
          from alpaca.data.timeframe import TimeFrame

          api_key = os.environ["ALPACA_API_KEY"]
          secret_key = os.environ["ALPACA_SECRET_KEY"]
          feed = os.getenv("ALPACA_DATA_FEED", "iex").strip() or "iex"

          try:
              trading = TradingClient(api_key, secret_key, paper=True)
              account = trading.get_account()
              print(f"Trading auth OK. Account status: {getattr(account, 'status', 'unknown')}")
          except Exception as exc:
              raise SystemExit(
                  "Alpaca trading authentication failed. "
                  "Check ALPACA_API_KEY / ALPACA_SECRET_KEY and make sure they are paper trading API keys. "
                  f"Underlying error: {exc}"
              )

          try:
              data_client = StockHistoricalDataClient(api_key, secret_key)
              req = StockBarsRequest(
                  symbol_or_symbols=["SPY"],
                  timeframe=TimeFrame.Day,
                  start=datetime.now(timezone.utc) - timedelta(days=10),
                  end=datetime.now(timezone.utc),
                  feed=feed,
              )
              bars = data_client.get_stock_bars(req).df
              if bars.empty:
                  raise SystemExit(
                      f"Alpaca market data auth succeeded but returned no bars for SPY using feed={feed}."
                  )
              print(f"Market data auth OK using feed={feed}.")
          except Exception as exc:
              raise SystemExit(
                  "Alpaca market data request failed. "
                  "Most likely causes are invalid API keys, stale secrets, or ALPACA_DATA_FEED set to sip without entitlement. "
                  "Try setting ALPACA_DATA_FEED=iex in GitHub Secrets. "
                  f"Underlying error: {exc}"
              )
          PY

      - name: Train model
        run: |
          python -m broker_bot.cli train

      - name: Rebalance paper portfolio
        run: |
          python -m broker_bot.cli rebalance

      - name: Snapshot account
        run: |
          python -m broker_bot.cli snapshot

      - name: Review prior decisions
        run: |
          python -m broker_bot.cli review-decisions

      - name: Generate advisor report
        run: |
          python -m broker_bot.cli advisor-report

      - name: Generate strategy report
        run: |
          python -m broker_bot.cli strategy-report

      - name: Generate attribution report
        run: |
          python -m broker_bot.cli attribution-report

      - name: Generate champion challenger report
        run: |
          python -m broker_bot.cli champion-report

      - name: Rebalance LLM paper portfolio
        if: ${{ steps.llm_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli rebalance-llm

      - name: Snapshot LLM account
        if: ${{ steps.llm_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli snapshot-llm

      - name: Generate LLM coach report
        if: ${{ steps.llm_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli review-decisions-llm

      - name: Generate LLM attribution report
        if: ${{ steps.llm_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli attribution-report-llm

      - name: Generate LLM champion challenger report
        if: ${{ steps.llm_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli champion-report-llm

      - name: Rebalance Stat Arb paper portfolio
        if: ${{ steps.stat_arb_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli rebalance-stat-arb

      - name: Snapshot Stat Arb account
        if: ${{ steps.stat_arb_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli snapshot-stat-arb

      - name: Review Stat Arb decisions
        if: ${{ steps.stat_arb_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli review-decisions-stat-arb

      - name: Generate Stat Arb attribution report
        if: ${{ steps.stat_arb_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli attribution-report-stat-arb

      - name: Generate Stat Arb champion challenger report
        if: ${{ steps.stat_arb_bot_config.outputs.enabled == 'true' }}
        run: |
          python -m broker_bot.cli champion-report-stat-arb

      - name: Generate options scaffold report
        run: |
          python -m broker_bot.cli options-report

      - name: Generate all-model summary report
        run: |
          python -m broker_bot.cli summary-report

      - name: Build dashboard snapshot
        run: |
          python scripts/build_snapshot.py

      - name: Commit snapshot and learned state
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          git config user.name "broker-bot"
          git config user.email "broker-bot@users.noreply.github.com"
          git add data/dashboard_snapshot.json data/learned_policy.json data/reports
          if [ -f data/champion_challenger_policy.json ]; then
            git add data/champion_challenger_policy.json
          fi
          if git diff --cached --quiet; then
            echo "No bot output changes to commit."
            exit 0
          fi
          git commit -m "Update broker bot cloud outputs"
          for attempt in 1 2 3 4 5; do
            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; retrying after a short pause."
            sleep 5
          done
          echo "Unable to push broker bot outputs after 5 attempts."
          exit 1
